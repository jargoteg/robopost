# ── RoboPost configuration ──────────────────────────────────────────
account:
  name: "Dr. Jahir Argote Gerald"        # shown on cards / video outro
  handle: "@jahirargote"
  niche:  "PhD researcher in swarm robotics sharing paper reviews with honest takes"

sources:
  arxiv_categories: ["cs.RO", "cs.MA"] # cs.MA = multi-agent / swarm
  arxiv_max_results: 40                # fetched per day before ranking
  hf_daily_papers: true                # also pull Hugging Face daily papers
  journal_feeds:                       # top journals — treated as PAPERS, prioritized over arXiv
    - https://www.science.org/action/showFeed?type=etoc&feed=rss&jc=scirobotics   # Science Robotics
    - https://www.nature.com/natmachintell.rss                                    # Nature Machine Intelligence
    - https://www.nature.com/ncomms.rss                                           # Nature Communications
    - https://www.nature.com/subjects/robotics.rss                                # Nature (robotics subject)
    - https://onlinelibrary.wiley.com/feed/15564967/most-recent                   # Journal of Field Robotics
    - https://onlinelibrary.wiley.com/feed/15564967/most-cited                    # JFR most-cited (evergreen field work)
    - https://ieeexplore.ieee.org/rss/TOC7083369.XML                              # IEEE Robotics & Automation Letters (RA-L)
    - https://ieeexplore.ieee.org/rss/TOC8860                                     # IEEE Trans. Robotics (T-RO)
  journal_priority: true               # journal papers get a ranking boost over arXiv
  journal_names:                       # used to tag + boost; matched loosely in source/url
    - science robotics
    - nature
    - nature communications
    - nature machine intelligence
    - ncomms
    - scirobotics
    - cell
    - pnas
    - ieee
    - field robotics
    - jfr
    - robotics and automation letters
    - transactions on robotics
    - ra-l
    - t-ro
  evergreen:
    enabled: true                      # daily: 1 older landmark/underrated paper
    per_day: 1                         # enters ranking alongside fresh papers
  news_feeds:                          # RSS — competitions, industry, lab news
    - https://spectrum.ieee.org/feeds/topic/robotics.rss
    - https://www.therobotreport.com/feed/
    - https://robohub.org/feed/
  news_keywords:                       # RSS item kept only if it matches one
    - robot
    - robocup
    - humanoid
    - drone
    - manipulation
    - autonomous
    - competition
    - swarm
    - multi-robot
    - collective
    - inspection
    - field robot
    - search and rescue
    - subsea
    - underwater
    - mining
    - offshore
    - pipeline
  watch_pages:                         # news pages WITHOUT an RSS feed —
    - https://www.bristolroboticslab.com/brl-news   # fetched + items extracted by Claude
  youtube_enrichment: true             # find project/demo videos for picked items
                                       # (requires YOUTUBE_API_KEY secret; free)
  keywords_boost:                      # papers matching these rank higher
    - manipulation
    - locomotion
    - humanoid
    - "sim-to-real"
    - "imitation learning"
    - "reinforcement learning"
    - VLA
    - "foundation model"
    - "swarm robotics"
    - "collective behavior"
    - "multi-robot"
    - "field robotics"
    - inspection
    - "search and rescue"
    - subsea
    - underwater
    - mining
    - construction
    - agriculture
    - forestry
    - nuclear
    - "confined space"
    - "offshore"
    - "pipeline"
    - "infrastructure inspection"
    - "legged"
    - "all-terrain"
    - "disaster response"
  deprioritize_topics:                 # ranked LOWER unless real-hardware results
    - "sim-to-real"
    - "sample efficiency"
    - "sample-efficient"
    - "reward shaping"
    - "policy learning"
    - "reinforcement learning benchmark"
    - "simulation results"
    - "in simulation"

posting:
  min_gap_minutes: 90                  # spacing between posts; queue drains every 30 min

trends:
  queries: ["robotics", "robot learning", "humanoid robot", "swarm robots", "robot arm"]

pipeline:
  drafts_per_day: 2
  review_buffer: 6           # target number of open drafts awaiting review
  source_mix:                # per-batch mix: journals reserved, arXiv capped
    journal_min: 2           # journal papers guaranteed slots (if available)
    arxiv_max: 2             # arXiv papers max per batch (rest fills by score)
  max_news_per_day: 1            # news/RSS items cap; papers get the rest
  min_hours_between_posts: 3     # approved drafts wait in queue; no feed spam                    # how many papers become drafts daily
  min_relevance_score: 6               # 0-10, Claude-ranked; below = skipped
  model: "claude-sonnet-4-6"

platforms:
  bluesky: true
  instagram: true
  tiktok: true

visuals:
  carousel_size: [1080, 1350]          # IG portrait
  video_size: [1080, 1920]             # 9:16
  max_slides: 6
  bg_color: "#131017"
  accent_color: "#FF8A2B"              # warm orange: complementary to Bluesky's blue UI
  accent2_color: "#3E7BFF"             # cool counterpoint glow (color complexity)
  text_color: "#FAF7F2"
  tts_voice: "en-US-AndrewNeural"      # edge-tts voice for video narration

# Public base URL for media (Instagram Graph API requires publicly
# reachable image URLs). With a PUBLIC repo this works out of the box:
media_base_url: "https://raw.githubusercontent.com/jargoteg/robopost/main"

conferences:
  track: [ICRA, IROS, RSS, CoRL, DARS, MRS, Humanoids, RoboCup, ICSR, FSR, SSRR, ICUR, "IEEE OCEANS", CASE, WAFR]
  # FSR=Field & Service Robotics, SSRR=Safety Security & Rescue Robotics,
  # OCEANS=marine robotics, CASE=Automation Science & Eng, WAFR=algorithmic
  window_before_days: 21               # boost/preview window before start
  window_after_days: 10                # results coverage window after end
