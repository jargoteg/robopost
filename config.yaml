# ── RoboPost configuration ──────────────────────────────────────────
account:
  name: "Dr. Jahir Argote Gerald"        # shown on cards / video outro
  handle: "@jahirargote"
  niche: "academic robotics — paper reviews with sharp, accessible commentary"

sources:
  arxiv_categories: ["cs.RO", "cs.MA"] # cs.MA = multi-agent / swarm
  arxiv_max_results: 40                # fetched per day before ranking
  hf_daily_papers: true                # also pull Hugging Face daily papers
  news_feeds:                          # RSS — competitions, industry, lab news
    - https://spectrum.ieee.org/feeds/topic/robotics.rss
    - https://www.therobotreport.com/feed/
    - https://robohub.org/feed/
  news_keywords:                       # RSS item kept only if it matches one
    - robot
    - robocup
    - humanoid
    - drone
    - manipulation
    - autonomous
    - competition
    - swarm
    - multi-robot
    - collective
  watch_pages:                         # news pages WITHOUT an RSS feed —
    - https://www.bristolroboticslab.com/brl-news   # fetched + items extracted by Claude
  youtube_enrichment: true             # find project/demo videos for picked items
                                       # (requires YOUTUBE_API_KEY secret; free)
  keywords_boost:                      # papers matching these rank higher
    - manipulation
    - locomotion
    - humanoid
    - "sim-to-real"
    - "imitation learning"
    - "reinforcement learning"
    - VLA
    - "foundation model"
    - "swarm robotics"
    - "collective behavior"
    - "multi-robot"

pipeline:
  drafts_per_day: 2                    # how many papers become drafts daily
  min_relevance_score: 6               # 0-10, Claude-ranked; below = skipped
  model: "claude-sonnet-4-6"

platforms:
  bluesky: true
  instagram: true
  tiktok: true

visuals:
  carousel_size: [1080, 1350]          # IG portrait
  video_size: [1080, 1920]             # 9:16
  max_slides: 6
  bg_color: "#0E1116"
  accent_color: "#4FD1C5"
  text_color: "#F5F5F5"
  tts_voice: "en-US-AndrewNeural"      # edge-tts voice for video narration

# Public base URL for media (Instagram Graph API requires publicly
# reachable image URLs). With a PUBLIC repo this works out of the box:
media_base_url: "https://raw.githubusercontent.com/jargoteg/robopost/main"

conferences:
  track: [ICRA, IROS, RSS, CoRL, DARS, MRS, Humanoids, RoboCup, ICSR]
  window_before_days: 21               # boost/preview window before start
  window_after_days: 10                # results coverage window after end
