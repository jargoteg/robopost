name: Daily content pipeline
on:
  schedule:
    - cron: "0 6 * * *"        # 06:00 UTC daily
  workflow_dispatch:            # manual trigger button
permissions:
  contents: write
  issues: write
concurrency: robopost-data
jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu
      - run: pip install -r requirements.txt
      - name: Fetch & rank content (papers + news feeds)
        env:
          ANTHROPIC_API_KEY: "${{ secrets.ANTHROPIC_API_KEY }}"
          YOUTUBE_API_KEY: "${{ secrets.YOUTUBE_API_KEY }}"
        run: python src/fetch_papers.py
      - name: Generate drafts
        env: { ANTHROPIC_API_KEY: "${{ secrets.ANTHROPIC_API_KEY }}" }
        run: python src/generate.py
      - name: Render carousels
        run: python src/visuals.py
      - name: Build videos
        run: python src/video.py
      - name: Commit media (must exist before issues embed it)
        run: |
          git config user.name robopost-bot
          git config user.email bot@users.noreply.github.com
          git add data media docs 2>/dev/null || git add data docs
          git commit -m "daily pipeline $(date -u +%F)" || echo "nothing to commit"
          for i in 1 2 3; do
            if git pull --rebase; then
              git push && exit 0
            fi
            python src/merge_state.py
            GIT_EDITOR=true git rebase --continue || git rebase --skip || true
          done
          git push
      - name: Open review issues
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GITHUB_REPOSITORY: "${{ github.repository }}"
        run: python src/github_review.py create
      - name: Post any approved drafts (respects spacing)
        env:
          BLUESKY_HANDLE: "${{ secrets.BLUESKY_HANDLE }}"
          BLUESKY_APP_PASSWORD: "${{ secrets.BLUESKY_APP_PASSWORD }}"
          IG_ACCESS_TOKEN: "${{ secrets.IG_ACCESS_TOKEN }}"
          IG_USER_ID: "${{ secrets.IG_USER_ID }}"
          TIKTOK_ACCESS_TOKEN: "${{ secrets.TIKTOK_ACCESS_TOKEN }}"
        run: python src/post_all.py
      - name: Finalize posted (comment + close issues)
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GITHUB_REPOSITORY: "${{ github.repository }}"
        run: python src/github_review.py finalize
      - name: Commit issue links
        run: |
          git add data
          git commit -m "link review issues" || echo "nothing to commit"
          git pull --rebase && git push
