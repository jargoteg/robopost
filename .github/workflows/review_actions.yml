name: Review actions (instant)
on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]
permissions:
  contents: write
  issues: write
concurrency: robopost-data
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Instant acknowledgement (eyes reaction)
        if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            URL="${{ github.event.comment.url }}/reactions"
          else
            URL="${{ github.event.issue.url }}/reactions"
          fi
          curl -s -o /dev/null -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$URL" -d '{"content":"eyes"}'
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Handle command / manual paper
        id: handle
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GITHUB_REPOSITORY: "${{ github.repository }}"
          ANTHROPIC_API_KEY: "${{ secrets.ANTHROPIC_API_KEY }}"
        run: python src/github_review.py handle
      - name: Install media tools (regen only)
        if: steps.handle.outputs.regen == 'true'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu
      - name: Regenerate drafts (redo / manual add)
        if: steps.handle.outputs.regen == 'true'
        env:
          ANTHROPIC_API_KEY: "${{ secrets.ANTHROPIC_API_KEY }}"
        run: |
          python src/generate.py
          python src/visuals.py
          python src/video.py
      - name: Open new draft issues (regen only)
        if: steps.handle.outputs.regen == 'true'
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GITHUB_REPOSITORY: "${{ github.repository }}"
        run: python src/github_review.py create
      - name: Post approved drafts
        env:
          BLUESKY_HANDLE: "${{ secrets.BLUESKY_HANDLE }}"
          BLUESKY_APP_PASSWORD: "${{ secrets.BLUESKY_APP_PASSWORD }}"
          IG_ACCESS_TOKEN: "${{ secrets.IG_ACCESS_TOKEN }}"
          IG_USER_ID: "${{ secrets.IG_USER_ID }}"
          TIKTOK_ACCESS_TOKEN: "${{ secrets.TIKTOK_ACCESS_TOKEN }}"
        run: python src/post_all.py
      - name: Report results on issue & close
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GITHUB_REPOSITORY: "${{ github.repository }}"
        run: python src/github_review.py finalize
      - name: Rebuild dashboard
        if: always()
        run: python src/dashboard.py || true
      - name: Commit state
        if: always()
        run: |
          git config user.name robopost-bot
          git config user.email bot@users.noreply.github.com
          git add data media docs 2>/dev/null || git add data docs
          git commit -m "review action" || echo "nothing to commit"
          for i in 1 2 3; do
            if git pull --rebase; then
              git push && exit 0
            fi
            python src/merge_state.py
            GIT_EDITOR=true git rebase --continue || git rebase --skip || true
          done
          git push
