name: Review actions (instant)
on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]
permissions:
  contents: write
  issues: write
concurrency: robopost-data
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install requests pyyaml
      - name: Handle command / manual paper
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GITHUB_REPOSITORY: "${{ github.repository }}"
        run: python src/github_review.py handle
      - name: Post approved drafts
        env:
          BLUESKY_HANDLE: "${{ secrets.BLUESKY_HANDLE }}"
          BLUESKY_APP_PASSWORD: "${{ secrets.BLUESKY_APP_PASSWORD }}"
          IG_ACCESS_TOKEN: "${{ secrets.IG_ACCESS_TOKEN }}"
          IG_USER_ID: "${{ secrets.IG_USER_ID }}"
          TIKTOK_ACCESS_TOKEN: "${{ secrets.TIKTOK_ACCESS_TOKEN }}"
        run: python src/post_all.py
      - name: Report results on issue & close
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GITHUB_REPOSITORY: "${{ github.repository }}"
        run: python src/github_review.py finalize
      - name: Commit state
        run: |
          git config user.name robopost-bot
          git config user.email bot@users.noreply.github.com
          git add data
          git commit -m "review action" || echo "nothing to commit"
          git pull --rebase && git push
