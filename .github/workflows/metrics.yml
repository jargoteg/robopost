name: Metrics & learning loop
on:
  schedule:
    - cron: "0 22 * * *"        # 22:00 UTC daily
  workflow_dispatch:
permissions:
  contents: write
concurrency: robopost-data
jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Collect metrics & update lessons
        env:
          ANTHROPIC_API_KEY: "${{ secrets.ANTHROPIC_API_KEY }}"
          BLUESKY_HANDLE: "${{ secrets.BLUESKY_HANDLE }}"
          BLUESKY_APP_PASSWORD: "${{ secrets.BLUESKY_APP_PASSWORD }}"
          IG_ACCESS_TOKEN: "${{ secrets.IG_ACCESS_TOKEN }}"
        run: python src/metrics.py
      - name: Rebuild dashboard
        if: always()
        run: python src/dashboard.py || true
      - name: Commit state
        run: |
          git config user.name robopost-bot
          git config user.email bot@users.noreply.github.com
          git add data media docs 2>/dev/null || git add data docs
          git commit -m "metrics $(date -u +%F)" || echo "nothing to commit"
          for i in 1 2 3; do
            if git pull --rebase; then
              git push && exit 0
            fi
            python src/merge_state.py
            GIT_EDITOR=true git rebase --continue || git rebase --skip || true
          done
          git push
