name: Metrics & learning loop
on:
  schedule:
    - cron: "0 22 * * *"        # 22:00 UTC daily
  workflow_dispatch:
permissions:
  contents: write
concurrency: robopost-data
jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - name: Collect metrics & update lessons
        env:
          ANTHROPIC_API_KEY: "${{ secrets.ANTHROPIC_API_KEY }}"
          BLUESKY_HANDLE: "${{ secrets.BLUESKY_HANDLE }}"
          BLUESKY_APP_PASSWORD: "${{ secrets.BLUESKY_APP_PASSWORD }}"
          IG_ACCESS_TOKEN: "${{ secrets.IG_ACCESS_TOKEN }}"
        run: python src/metrics.py
      - name: Commit state
        run: |
          git config user.name robopost-bot
          git config user.email bot@users.noreply.github.com
          git add data
          git commit -m "metrics $(date -u +%F)" || echo "nothing to commit"
          git pull --rebase && git push
