name: CI
on:
  push:
    branches: [main]
    paths: ["src/**", "tests/**", "requirements.txt", ".github/workflows/**"]
  pull_request:
  workflow_dispatch:
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt ruff pytest
      - name: Lint
        run: ruff check src/
      - name: Tests
        run: python -m pytest tests/ -q
