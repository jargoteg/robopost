name: Conference radar (weekly)
on:
  schedule:
    - cron: "0 5 * * 1"         # Mondays 05:00 UTC
  workflow_dispatch:
permissions:
  contents: write
concurrency: robopost-data
jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - name: Refresh conference calendar (Claude + web search)
        env: { ANTHROPIC_API_KEY: "${{ secrets.ANTHROPIC_API_KEY }}" }
        run: python src/conference_radar.py
      - name: Commit calendar
        run: |
          git config user.name robopost-bot
          git config user.email bot@users.noreply.github.com
          git add data
          git commit -m "conference radar $(date -u +%F)" || echo "nothing to commit"
          git pull --rebase && git push
