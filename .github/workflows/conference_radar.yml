name: Conference radar (weekly)
on:
  schedule:
    - cron: "0 5 * * 1"         # Mondays 05:00 UTC
  workflow_dispatch:
permissions:
  contents: write
concurrency: robopost-data
jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Refresh conference calendar (Claude + web search)
        env: { ANTHROPIC_API_KEY: "${{ secrets.ANTHROPIC_API_KEY }}" }
        run: python src/conference_radar.py
      - name: Commit calendar
        run: |
          git config user.name robopost-bot
          git config user.email bot@users.noreply.github.com
          git add data media 2>/dev/null || git add data
          git commit -m "conference radar $(date -u +%F)" || echo "nothing to commit"
          for i in 1 2 3; do
            if git pull --rebase; then
              git push && exit 0
            fi
            python src/merge_state.py
            GIT_EDITOR=true git rebase --continue || git rebase --skip || true
          done
          git push
