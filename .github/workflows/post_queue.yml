name: Post queue drainer
on:
  schedule:
    - cron: "*/30 * * * *"    # best-effort; posts respect the 90-min spacing anyway
  workflow_dispatch:
permissions:
  contents: write
  issues: write
concurrency: robopost-data
jobs:
  drain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Post approved drafts (respects 90-min spacing)
        env:
          BLUESKY_HANDLE: "${{ secrets.BLUESKY_HANDLE }}"
          BLUESKY_APP_PASSWORD: "${{ secrets.BLUESKY_APP_PASSWORD }}"
          IG_ACCESS_TOKEN: "${{ secrets.IG_ACCESS_TOKEN }}"
          IG_USER_ID: "${{ secrets.IG_USER_ID }}"
          TIKTOK_ACCESS_TOKEN: "${{ secrets.TIKTOK_ACCESS_TOKEN }}"
        run: python src/post_all.py
      - name: Finalize (comment results + close issues)
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GITHUB_REPOSITORY: "${{ github.repository }}"
        run: python src/github_review.py finalize
      - name: Commit state
        if: always()
        run: |
          git config user.name robopost-bot
          git config user.email bot@users.noreply.github.com
          git add data
          git commit -m "post queue drain" || echo "nothing to commit"
          for i in 1 2 3; do
            if git pull --rebase; then git push && exit 0; fi
            python src/merge_state.py
            GIT_EDITOR=true git rebase --continue || git rebase --skip || true
          done
          git push
