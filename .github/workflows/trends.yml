name: Trends radar (6-hourly)
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency: robopost-data
jobs:
  trends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Listen to the community
        env:
          ANTHROPIC_API_KEY: "${{ secrets.ANTHROPIC_API_KEY }}"
          BLUESKY_HANDLE: "${{ secrets.BLUESKY_HANDLE }}"
          BLUESKY_APP_PASSWORD: "${{ secrets.BLUESKY_APP_PASSWORD }}"
        run: python src/trends.py
      - name: Rebuild dashboard
        run: python src/dashboard.py
      - name: Commit state
        if: always()
        run: |
          git config user.name robopost-bot
          git config user.email bot@users.noreply.github.com
          git add data media docs 2>/dev/null || git add data docs
          git commit -m "trends radar" || echo "nothing to commit"
          for i in 1 2 3; do
            if git pull --rebase; then git push && exit 0; fi
            python src/merge_state.py
            GIT_EDITOR=true git rebase --continue || { git rebase --abort; git pull --no-rebase --no-edit -X ours; }
          done
          git push
