name: Build literature review
on:
  workflow_dispatch:
permissions:
  contents: write
  issues: write
concurrency: robopost-data
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-dejavu
      - name: Build review from next pending theme
        env:
          ANTHROPIC_API_KEY: "${{ secrets.ANTHROPIC_API_KEY }}"
        run: python src/litreview.py
      - name: Open review issue
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GITHUB_REPOSITORY: "${{ github.repository }}"
        run: python src/github_review.py create
      - name: Commit
        if: always()
        run: |
          git config user.name robopost-bot
          git config user.email bot@users.noreply.github.com
          git add data media docs 2>/dev/null || git add data
          git commit -m "litreview build" || echo "nothing to commit"
          for i in 1 2 3; do
            if git pull --rebase; then git push && exit 0; fi
            python src/merge_state.py
            GIT_EDITOR=true git rebase --continue || { git rebase --abort; git pull --no-rebase --no-edit -X ours; }
          done
          git push || true
